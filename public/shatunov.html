<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Открытка — Сергей Шатунов</title>
<link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Playfair+Display:ital,wght@0,700;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:#1a1a2e;
    font-family:'Cormorant Garamond',serif;
    overflow:hidden;
  }

  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .star{
    position:absolute;
    width:3px;height:3px;
    background:rgba(255,255,255,.6);
    border-radius:50%;
    animation:twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle{0%{opacity:.2;transform:scale(.8)}100%{opacity:1;transform:scale(1.3)}}

  .card{
    position:relative;z-index:1;
    width:min(480px,92vw);
    border-radius:24px;
    overflow:hidden;
    box-shadow:
      0 0 60px rgba(255,107,157,.25),
      0 0 120px rgba(147,112,219,.15),
      0 30px 80px rgba(0,0,0,.5);
    animation:cardIn 1.2s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn{
    0%{opacity:0;transform:translateY(60px) scale(.92)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }

  .card-bg{
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,107,157,.35) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(147,112,219,.3) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(59,130,246,.15) 0%, transparent 60%),
      linear-gradient(160deg, #1e1b3a 0%, #2d1f4e 30%, #1a1a3e 60%, #1e1b3a 100%);
    padding:40px 32px 36px;
  }

  .accent-line{
    width:60px;height:3px;
    background:linear-gradient(90deg,#ff6b9d,#9370db);
    border-radius:2px;
    margin:0 auto 28px;
    animation:accentGrow .8s .5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes accentGrow{0%{width:0;opacity:0}100%{width:60px;opacity:1}}

  .portrait-frame{
    width:200px;height:200px;
    margin:0 auto 24px;
    border-radius:50%;
    background:linear-gradient(135deg,#ff6b9d,#9370db,#5b86e5);
    padding:3px;
    box-shadow:0 0 40px rgba(255,107,157,.3);
    animation:portraitIn 1s .3s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes portraitIn{0%{opacity:0;transform:scale(.7) rotate(-10deg)}100%{opacity:1;transform:scale(1) rotate(0)}}

  .portrait-inner{
    width:100%;height:100%;
    border-radius:50%;
    overflow:hidden;
    position:relative;
  }
  .portrait-inner img{
    width:100%;height:100%;
    object-fit:cover;
    object-position:center 25%;
  }

  .name{
    font-family:'Playfair Display',serif;
    font-weight:700;
    font-size:26px;
    text-align:center;
    background:linear-gradient(135deg,#ff9ec6,#e0c3fc,#b8d0ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:6px;
    letter-spacing:2px;
    animation:fadeUp .8s .6s cubic-bezier(.22,1,.36,1) both;
  }

  .subtitle{
    text-align:center;
    font-size:13px;
    color:rgba(255,255,255,.4);
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:28px;
    animation:fadeUp .8s .75s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

  .divider{
    display:flex;align-items:center;gap:12px;
    margin-bottom:26px;
    animation:fadeUp .8s .85s cubic-bezier(.22,1,.36,1) both;
  }
  .divider span{
    flex:1;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,107,157,.3),transparent);
  }
  .divider .diamond{
    width:8px;height:8px;
    background:linear-gradient(135deg,#ff6b9d,#9370db);
    transform:rotate(45deg);
    border-radius:1px;
  }

  .poem{
    text-align:center;
    padding:0 8px;
  }
  .poem .line{
    font-family:'Marck Script',cursive;
    font-size:22px;
    color:rgba(255,255,255,.92);
    line-height:1.7;
    text-shadow:0 0 30px rgba(255,107,157,.2);
    opacity:0;
    animation:lineIn .7s cubic-bezier(.22,1,.36,1) forwards;
  }
  .poem .line:nth-child(1){animation-delay:1s}
  .poem .line:nth-child(2){animation-delay:1.4s}
  .poem .line:nth-child(3){animation-delay:1.8s}
  .poem .line:nth-child(4){animation-delay:2.2s}

  @keyframes lineIn{
    0%{opacity:0;transform:translateY(16px)}
    100%{opacity:1;transform:translateY(0)}
  }

  .poem .highlight{
    background:linear-gradient(135deg,#ff6b9d,#ff9ec6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    font-weight:600;
  }

  .bottom-decor{
    margin-top:30px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    animation:fadeUp .8s 2.6s cubic-bezier(.22,1,.36,1) both;
  }
  .bottom-decor .note{font-size:18px;opacity:.5;animation:noteFloat 2.5s ease-in-out infinite alternate}
  .bottom-decor .note:nth-child(1){animation-delay:0s}
  .bottom-decor .note:nth-child(2){animation-delay:.4s}
  .bottom-decor .note:nth-child(3){animation-delay:.8s}
  @keyframes noteFloat{0%{transform:translateY(0)}100%{transform:translateY(-6px)}}

  .era{
    text-align:center;
    margin-top:14px;
    font-size:11px;
    color:rgba(255,255,255,.25);
    letter-spacing:6px;
    text-transform:uppercase;
    animation:fadeUp .8s 2.8s cubic-bezier(.22,1,.36,1) both;
  }

  .corner{
    position:absolute;width:40px;height:40px;
    opacity:.2;
  }
  .corner svg{width:100%;height:100%}
  .corner.tl{top:16px;left:16px}
  .corner.tr{top:16px;right:16px;transform:rotate(90deg)}
  .corner.bl{bottom:16px;left:16px;transform:rotate(-90deg)}
  .corner.br{bottom:16px;right:16px;transform:rotate(180deg)}
</style>
</head>
