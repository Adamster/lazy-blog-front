name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  # Unit + component tests (Vitest). Headless, no network, deterministic — a
  # BLOCKING gate alongside `verify`.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Unit + component tests
        run: npm run test:run

  # Playwright smoke. The app proxies `/api/*` to a LIVE backend, so this flow
  # depends on external availability and is intentionally NON-BLOCKING
  # (`continue-on-error: true`). The spec also skips data-dependent steps when the
  # backend returns no posts. Promote to a required check by removing
  # `continue-on-error` once the API is reliably reachable from CI.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke spec
        run: npm run test:e2e

  # OpenAPI drift guard: the client in `src/shared/api/openapi` is generated from
  # a LIVE prod spec (`openapi-config.json` → blog-api-prod.notlazy.org), so the
  # committed client can silently drift from the contract. This job regenerates
  # it and fails if `git diff` is non-empty — i.e. "someone changed/forgot to
  # commit the regenerated client". It runs in its own job and is allowed to fail
  # (`continue-on-error`) for now because the live spec can be flaky/unreachable;
  # promote to a required, blocking check once the spec is reliably available
  # (or once it's served from a committed snapshot instead of a live URL).
  openapi-drift:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # The generator (`@openapitools/openapi-generator-cli`) runs a Java JAR.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - run: npm ci

      - name: Regenerate OpenAPI client
        run: npm run gen:api

      - name: Fail if generated client drifted
        run: |
          if ! git diff --exit-code src/shared/api/openapi; then
            echo "::error::Generated OpenAPI client is out of date. Run 'npm run gen:api' and commit the result."
            exit 1
          fi
